<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calendrier des cours - Printemps 2026</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&amp;display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://ybudoka.github.io/ybgaspesie/styles.css">
    <script>function showCourseModal(nomCours, heures, lieu, description) {
    const oldOverlay = document.getElementById('modal-overlay');
    if (oldOverlay) oldOverlay.remove();
    const overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal-content';
    let modalContent = '<button class="modal-close" id="modal-close-btn">&times;</button><div><h2>' + nomCours + '</h2>';
    if (heures) modalContent += '<p><strong>Heures :</strong> ' + heures + '</p>';
    if (lieu) modalContent += '<p><strong>Lieu :</strong> ' + lieu + '</p>';
    modalContent += '</div>';
    modal.innerHTML = modalContent;
    overlay.addEventListener('click', function() { overlay.remove(); });
    modal.addEventListener('click', function(e) { e.stopPropagation(); });
    setTimeout(function() {
      const closeBtn = document.getElementById('modal-close-btn');
      if (closeBtn) closeBtn.addEventListener('click', function(e) { e.stopPropagation(); overlay.remove(); });
    }, 10);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }</script><script>function setupCalendarLegendFilters() {
    var toggleButtons = Array.prototype.slice.call(document.querySelectorAll('.calendar-legend-toggle[data-session-slug], .calendar-legend-toggle[data-filter-type="cancelled"]'));
    var resetButton = document.querySelector('.calendar-filter-reset');
    var courseEntries = Array.prototype.slice.call(document.querySelectorAll('.course-entry[data-session-slug], .course-entry.course-entry-cancelled'));
    if (!toggleButtons.length || !courseEntries.length) return;

    var hiddenSessions = {};
    var hideCancelled = false;

    function updateFilterState() {
      toggleButtons.forEach(function(button) {
        var filterType = button.getAttribute('data-filter-type') || '';
        if (filterType === 'cancelled') {
          var cancelledVisible = !hideCancelled;
          button.classList.toggle('is-selected', cancelledVisible);
          button.classList.toggle('is-muted', !cancelledVisible);
          button.setAttribute('aria-pressed', cancelledVisible ? 'true' : 'false');
          return;
        }

        var slug = button.getAttribute('data-session-slug') || '';
        var isVisible = !hiddenSessions[slug];
        button.classList.toggle('is-selected', isVisible);
        button.classList.toggle('is-muted', !isVisible);
        button.setAttribute('aria-pressed', isVisible ? 'true' : 'false');
      });

      courseEntries.forEach(function(entry) {
        if (entry.classList.contains('course-entry-cancelled')) {
          entry.classList.toggle('session-dimmed', hideCancelled);
          return;
        }
        var slug = entry.getAttribute('data-session-slug') || '';
        var isDimmed = !!hiddenSessions[slug];
        entry.classList.toggle('session-dimmed', isDimmed);
      });
    }

    toggleButtons.forEach(function(button) {
      button.addEventListener('click', function() {
        var filterType = button.getAttribute('data-filter-type') || '';
        if (filterType === 'cancelled') {
          hideCancelled = !hideCancelled;
          updateFilterState();
          return;
        }

        var slug = button.getAttribute('data-session-slug') || '';
        hiddenSessions[slug] = !hiddenSessions[slug];
        updateFilterState();
      });
    });

    if (resetButton) {
      resetButton.addEventListener('click', function() {
        hiddenSessions = {};
        hideCancelled = false;
        updateFilterState();
      });
    }

    updateFilterState();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupCalendarLegendFilters);
  } else {
    setupCalendarLegendFilters();
  }</script>
</head>
<body>
    <div style="text-align: center; margin-top: 20px;">
      <img src="baniere-site.png" alt="Logo YBG" style="max-width: 100%; height: auto; width: 100%; max-width: 800px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);">
    </div>
    <div class="container" style="position: relative; z-index: 1;">
        <h2>Calendrier des cours - 2026-2026</h2><div class="calendar-session-meta">
      <p><strong>Session active:</strong> Printemps 2026</p>
      <p><strong>Session en inscription:</strong> Printemps 2026</p>
    </div>
        <p>Aucun cours à afficher pour la session en cours.</p>
    </div>

    
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirection - Site Généré Automatiquement</title>
    <meta http-equiv="refresh" content="0; url=accueil.html">
    <link rel="canonical" href="accueil.html">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1d23 0%, #2d3340 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .redirect-message {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .redirect-message h1 {
            color: #ffd700;
            margin-bottom: 1rem;
        }
        .redirect-message a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        .redirect-message a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        // Redirection JavaScript comme fallback
        window.location.href = 'accueil.html';
    </script>
</head>
<body>
    <div class="redirect-message">
        <h1>Redirection en cours...</h1>
        <p>Si la redirection ne fonctionne pas automatiquement, <a href="accueil.html">cliquez ici</a>.</p>
    </div>

</html>
